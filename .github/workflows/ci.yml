name: Pull Request CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Run tests
        run: mvn -B test

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run verify with coverage reports
        run: mvn -B verify

      - name: Compute project-wide coverage
        id: coverage
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          reports = sorted(Path("rule-kit-java").glob("*/target/site/jacoco/jacoco.xml"))
          if not reports:
              raise SystemExit("No module coverage reports found under rule-kit-java/*/target/site/jacoco/jacoco.xml")

          covered = 0
          missed = 0
          generated_skipped = 0
          for report in reports:
              root = ET.parse(report).getroot()
              for package in root.findall("package"):
                  if "jmh_generated" in package.attrib.get("name", ""):
                      for cls in package.findall("class"):
                          line = next((counter for counter in cls.findall("counter") if counter.attrib["type"] == "LINE"), None)
                          if line is not None:
                              generated_skipped += int(line.attrib["covered"]) + int(line.attrib["missed"])
                      continue
                  for cls in package.findall("class"):
                      line = next((counter for counter in cls.findall("counter") if counter.attrib["type"] == "LINE"), None)
                      if line is not None:
                          covered += int(line.attrib["covered"])
                          missed += int(line.attrib["missed"])

          total = covered + missed
          coverage = 100.0 if total == 0 else covered * 100.0 / total

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"line_coverage={coverage:.2f}\n")
              fh.write(f"covered_lines={covered}\n")
              fh.write(f"missed_lines={missed}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## Project Coverage\n\n")
              fh.write(f"- Line coverage: `{coverage:.2f}%`\n")
              fh.write(f"- Covered lines: `{covered}`\n")
              fh.write(f"- Missed lines: `{missed}`\n")
              fh.write(f"- Module reports: `{len(reports)}`\n")
              fh.write(f"- Generated JMH lines excluded: `{generated_skipped}`\n")
              fh.write("- Threshold: `95.00%`\n")

          if coverage < 95.0:
              raise SystemExit(f"Coverage gate failed: {coverage:.2f}% < 95.00%")
          PY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: rule-kit-java/*/target/site/jacoco
