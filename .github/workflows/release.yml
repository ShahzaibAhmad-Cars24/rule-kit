name: Publish Versioned Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Validate And Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Derive release version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Set Maven project version
        run: mvn -B versions:set -DnewVersion="${RELEASE_VERSION}" -DgenerateBackupPoms=false

      - name: Run verify with coverage reports
        run: mvn -B verify

      - name: Enforce project-wide coverage gate
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          reports = sorted(Path("rule-kit-java").glob("*/target/site/jacoco/jacoco.xml"))
          if not reports:
              raise SystemExit("No module coverage reports found under rule-kit-java/*/target/site/jacoco/jacoco.xml")

          covered = 0
          missed = 0
          generated_skipped = 0
          for report in reports:
              root = ET.parse(report).getroot()
              for package in root.findall("package"):
                  if "jmh_generated" in package.attrib.get("name", ""):
                      for cls in package.findall("class"):
                          line = next((counter for counter in cls.findall("counter") if counter.attrib["type"] == "LINE"), None)
                          if line is not None:
                              generated_skipped += int(line.attrib["covered"]) + int(line.attrib["missed"])
                      continue
                  for cls in package.findall("class"):
                      line = next((counter for counter in cls.findall("counter") if counter.attrib["type"] == "LINE"), None)
                      if line is not None:
                          covered += int(line.attrib["covered"])
                          missed += int(line.attrib["missed"])

          total = covered + missed
          coverage = 100.0 if total == 0 else covered * 100.0 / total

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## Release Coverage Gate\n\n")
              fh.write(f"- Release version: `{os.environ['RELEASE_VERSION']}`\n")
              fh.write(f"- Line coverage: `{coverage:.2f}%`\n")
              fh.write(f"- Module reports: `{len(reports)}`\n")
              fh.write(f"- Generated JMH lines excluded: `{generated_skipped}`\n")
              fh.write("- Threshold: `95.00%`\n")

          if coverage < 95.0:
              raise SystemExit(f"Coverage gate failed: {coverage:.2f}% < 95.00%")
          PY

      - name: Publish packages to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: mvn -B deploy -DskipTests
