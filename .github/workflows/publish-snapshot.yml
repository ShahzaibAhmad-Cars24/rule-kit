name: Publish Snapshot Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish 1.0.0-SNAPSHOT to GitHub Packages
    runs-on: ubuntu-latest
    if: github.repository == 'ShahzaibAhmad-Cars24/rule-kit'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Verify
        run: mvn -B clean test

      - name: Publish client-facing SDK artifacts
        run: >
          mvn -B
          -pl rule-kit-java/rule-kit-sdk,rule-kit-java/rule-kit-spring-boot-starter
          -am
          clean
          deploy
          -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
